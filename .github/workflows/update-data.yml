name: Actualizar Dashboard Marfil

on:
  schedule:
    # 8am, 9am, 10am, 11am COT (UTC-5) = 13, 14, 15, 16 UTC
    # 2pm COT = 19 UTC
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create credentials file
        run: echo '${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}' > credentials.json

      - name: Run data update
        env:
          ENVIA_API_KEY: ${{ secrets.ENVIA_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_ACCOUNT_ID_1: ${{ secrets.META_ACCOUNT_ID_1 }}
          META_ACCOUNT_ID_2: ${{ secrets.META_ACCOUNT_ID_2 }}
          GOOGLE_SHEETS_CREDENTIALS_PATH: credentials.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_ACCESS_TOKEN: ${{ secrets.SHOPIFY_ACCESS_TOKEN }}
          MELI_CLIENT_ID: ${{ secrets.MELI_CLIENT_ID }}
          MELI_CLIENT_SECRET: ${{ secrets.MELI_CLIENT_SECRET }}
          MELI_REFRESH_TOKEN: ${{ secrets.MELI_REFRESH_TOKEN }}
          MELI_USER_ID: ${{ secrets.MELI_USER_ID }}
          MELI_REDIRECT_URI: ${{ secrets.MELI_REDIRECT_URI }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AMAZON_SELLER_ID: ${{ secrets.AMAZON_SELLER_ID }}
          AMAZON_MARKETPLACE_ID: ${{ secrets.AMAZON_MARKETPLACE_ID }}
          AMAZON_REFRESH_TOKEN: ${{ secrets.AMAZON_REFRESH_TOKEN }}
          AMAZON_LWA_CLIENT_ID: ${{ secrets.AMAZON_LWA_CLIENT_ID }}
          AMAZON_LWA_CLIENT_SECRET: ${{ secrets.AMAZON_LWA_CLIENT_SECRET }}
        run: python main.py

      - name: Update MELI_REFRESH_TOKEN secret (rotated)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GH_PAT_SECRETS || secrets.GITHUB_TOKEN }}
        run: |
          if [ -f .meli_token_cache.json ]; then
            NEW_TOKEN=$(python -c "import json; print(json.load(open('.meli_token_cache.json'))['refresh_token'])")
            if [ -n "$NEW_TOKEN" ]; then
              echo "::add-mask::$NEW_TOKEN"
              if [ -n "${{ secrets.GH_PAT_SECRETS }}" ]; then
                echo "MELI_REFRESH_TOKEN rotó — actualizando secret del repo vía PAT"
                echo -n "$NEW_TOKEN" | gh secret set MELI_REFRESH_TOKEN --repo ${{ github.repository }}
              else
                echo "⚠ GH_PAT_SECRETS no configurado — el secret no se actualizará automáticamente."
                echo "Si el workflow empieza a fallar con invalid_grant, actualizar manualmente el secret."
              fi
            fi
            rm -f .meli_token_cache.json
          fi

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.json
          git diff --staged --quiet || git commit -m "📊 Actualización automática $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
