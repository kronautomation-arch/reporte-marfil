name: Actualizar Dashboard Marfil

on:
  schedule:
    # 8am, 9am, 10am, 11am COT (UTC-5) = 13, 14, 15, 16 UTC
    # 2pm COT = 19 UTC
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
    - cron: '0 15 * * *'
    - cron: '0 16 * * *'
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create credentials file
        run: echo '${{ secrets.GOOGLE_SHEETS_CREDENTIALS }}' > credentials.json

      - name: Run data update
        env:
          ENVIA_API_KEY: ${{ secrets.ENVIA_API_KEY }}
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_ACCOUNT_ID_1: ${{ secrets.META_ACCOUNT_ID_1 }}
          META_ACCOUNT_ID_2: ${{ secrets.META_ACCOUNT_ID_2 }}
          GOOGLE_SHEETS_CREDENTIALS_PATH: credentials.json
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python main.py

      - name: Cleanup credentials
        if: always()
        run: rm -f credentials.json

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard.json
          git diff --staged --quiet || git commit -m "📊 Actualización automática $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
